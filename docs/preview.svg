<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" role="img" aria-label="Mini Time Widget preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="680" height="300" rx="28" fill="url(#bg)"/>

  <rect x="120" y="74" width="440" height="152" rx="26" fill="url(#card)" stroke="url(#ring)" stroke-width="2"/>
  <line x1="340" y1="98" x2="340" y2="202" stroke="#334155" stroke-width="2" stroke-dasharray="3 5"/>

  <g font-family="'JetBrains Mono','SF Mono',monospace" text-anchor="middle">
    <text x="230" y="150" font-size="54" font-weight="700" fill="#f8fafc" filter="url(#glow)">14:30</text>
    <text x="450" y="150" font-size="54" font-weight="700" fill="#f8fafc" filter="url(#glow)">07:30</text>
  </g>
  <g font-family="'Inter',system-ui,sans-serif" text-anchor="middle" font-size="20" letter-spacing="2">
    <text x="230" y="188" fill="#67e8f9" opacity="0.85">MOSCOW</text>
    <text x="450" y="188" fill="#a5b4fc" opacity="0.85">NEW YORK</text>
  </g>
</svg>
